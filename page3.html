    <div id="imageGallery" class="row" style="margin-top: 15px;">
        <!-- Your gallery images will be displayed here -->
    </div>

    <script>
        // Function to parse query parameters from the URL
        function getQueryVariable(variable) {
            const query = window.location.search.substring(1);
            const vars = query.split('&');
            for (let i = 0; i < vars.length; i++) {
                const pair = vars[i].split('=');
                if (decodeURIComponent(pair[0]) === variable) {
                    return decodeURIComponent(pair[1]);
                }
            }
            return null;
        }

        // Get the selected gift from the query parameter
        const selectedGift = getQueryVariable('gift');

        // Display the selected gift (you can customize this)
        if (selectedGift) {
            document.getElementById('imageGallery').innerHTML = `<h2>${selectedGift}</h2>`;
        } else {
            document.getElementById('imageGallery').innerHTML = '<p>No gift selected.</p>';
        }

        // Here, you can load and display images related to the selected gift.
        // Example: Load and display images for the selected gift
        if (selectedGift === 'video_games_male') {
            // Load video games images
            const galleryImages = ['VG1.jpg', 'VG2.jpg', 'VG3.jpg', 'VG4.jpg', 'VG5.jpg', 'VG6.jpg','VG7.jpg', 'VG8.jpg'];
            const galleryContainer = document.getElementById('imageGallery');

            // Clear any existing content in the gallery
            galleryContainer.innerHTML = '';

            for (const image of galleryImages) {
                // Create a Bootstrap card for each image
                const card = document.createElement('div');
                card.className = 'col-md-3 mb-3';

                const cardBody = document.createElement('div');
                cardBody.className = 'card';

                const imgElement = document.createElement('img');
                imgElement.src = image;
                imgElement.className = 'card-img-top';

                const cardFooter = document.createElement('div');
                cardFooter.className = 'card-footer';
                cardFooter.innerText = 'Video-Games upto 50$';

                cardBody.appendChild(imgElement);
                cardBody.appendChild(cardFooter);
                card.appendChild(cardBody);

                galleryContainer.appendChild(card);
            }
        } 
        else if (selectedGift === 'Toys_male') {
            // Load images for another gift (similar structure to the above block)
            const galleryImages = ['teddy.jpg','Toy2.jpg','Toy3.jpg','Toy4.jpg','Toy5.jpg','Toy6.jpg','Toy7.jpg', 'Toy8.jpg'];
            const galleryContainer = document.getElementById('imageGallery');

            // Clear any existing content in the gallery
            galleryContainer.innerHTML = '';

            for (const image of galleryImages) {
                // Create a Bootstrap card for each image
                const card = document.createElement('div');
                card.className = 'col-md-3 mb-3';

                const cardBody = document.createElement('div');
                cardBody.className = 'card';

                const imgElement = document.createElement('img');
                imgElement.src = image;
                imgElement.className = 'card-img-top';

                const cardFooter = document.createElement('div');
                cardFooter.className = 'card-footer';
                cardFooter.innerText = 'Toys upto 35$';

                cardBody.appendChild(imgElement);
                cardBody.appendChild(cardFooter);
                card.appendChild(cardBody);

                galleryContainer.appendChild(card);
        }
    }
        // Add more conditions for other gifts as needed.
    </script>
